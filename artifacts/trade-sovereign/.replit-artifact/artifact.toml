kind = "web"
previewPath = "/"
title = "Trade Sovereign"
version = "1.0.0"
id = "artifacts/trade-sovereign"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23479
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/trade-sovereign run dev"

[services.env]
PORT = "23479"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/trade-sovereign", "run", "build"]
publicDir = "artifacts/trade-sovereign/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
