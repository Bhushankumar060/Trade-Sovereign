openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Trade Sovereign API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: products
  - name: media
  - name: orders
  - name: subscriptions
  - name: rewards
  - name: admin
  - name: ai
  - name: payments
  - name: categories
  - name: pages

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    put:
      operationId: updateProfile
      tags: [auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media:
    get:
      operationId: listMedia
      tags: [media]
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [music, movie]
        - name: page
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Media list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"

  /media/{id}:
    get:
      operationId: getMediaItem
      tags: [media]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Media item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"

  /media/{id}/download:
    get:
      operationId: getMediaDownloadUrl
      tags: [media]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlResponse"
        "403":
          description: Not purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /payments/create-order:
    post:
      operationId: createPaymentOrder
      tags: [payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "200":
          description: Razorpay order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RazorpayOrderResponse"

  /payments/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPaymentRequest"
      responses:
        "200":
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPaymentResponse"

  /subscriptions/my:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/plans:
    get:
      operationId: listSubscriptionPlans
      tags: [subscriptions]
      responses:
        "200":
          description: Plans list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlansResponse"

  /rewards/my:
    get:
      operationId: getMyRewards
      tags: [rewards]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardsResponse"

  /ai/analyze:
    post:
      operationId: aiAnalyze
      tags: [ai]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAnalyzeRequest"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalyzeResponse"

  /ai/search:
    post:
      operationId: aiSearch
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSearchResponse"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: AI chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /ai/conversations:
    get:
      operationId: listConversations
      tags: [ai]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
    post:
      operationId: saveConversation
      tags: [ai]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveConversationRequest"
      responses:
        "201":
          description: Conversation saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /ai/conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [ai]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /pages:
    get:
      operationId: listPages
      tags: [pages]
      responses:
        "200":
          description: Pages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageListResponse"

  /pages/{slug}:
    get:
      operationId: getPage
      tags: [pages]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: adminCreateProduct
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /admin/products/{id}:
    put:
      operationId: adminUpdateProduct
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/media:
    get:
      operationId: adminListMedia
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Media list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
    post:
      operationId: adminCreateMedia
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaRequest"
      responses:
        "201":
          description: Media item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItem"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/users/{id}/role:
    put:
      operationId: adminUpdateUserRole
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/analytics:
    get:
      operationId: adminGetAnalytics
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"

  /admin/categories:
    get:
      operationId: adminListCategories
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
    post:
      operationId: adminCreateCategory
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /admin/categories/{id}:
    put:
      operationId: adminUpdateCategory
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: adminDeleteCategory
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/pages:
    get:
      operationId: adminListPages
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageListResponse"
    post:
      operationId: adminCreatePage
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePageRequest"
      responses:
        "201":
          description: Page created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"

  /admin/pages/{id}:
    put:
      operationId: adminUpdatePage
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePageRequest"
      responses:
        "200":
          description: Page updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
    delete:
      operationId: adminDeletePage
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/ai-settings:
    get:
      operationId: adminGetAiSettings
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"
    put:
      operationId: adminUpdateAiSettings
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiSettingsRequest"
      responses:
        "200":
          description: AI settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSettings"

  /admin/subscription-plans:
    get:
      operationId: adminListSubscriptionPlans
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlansResponse"
    post:
      operationId: adminCreateSubscriptionPlan
      tags: [admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionPlanRequest"
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlan"

  /admin/subscription-plans/{id}:
    put:
      operationId: adminUpdateSubscriptionPlan
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionPlanRequest"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlan"
    delete:
      operationId: adminDeleteSubscriptionPlan
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [user, admin]
        loyaltyPoints:
          type: number
        createdAt:
          type: string
      required: [id, email, role, loyaltyPoints, createdAt]

    UpdateProfileRequest:
      type: object
      properties:
        displayName:
          type: string

    UpdateUserRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum: [user, admin]
      required: [role]

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: number
      required: [users, total]

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        productCount:
          type: number
        createdAt:
          type: string
      required: [id, name, slug, createdAt]

    CategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        total:
          type: number
      required: [categories, total]

    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
      required: [name, slug]

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        salePrice:
          type: number
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        stock:
          type: number
        imageUrl:
          type: string
        isDigital:
          type: boolean
        isSubscription:
          type: boolean
        createdAt:
          type: string
      required: [id, name, price, category, stock, isDigital, isSubscription, createdAt]

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: number
        page:
          type: number
        limit:
          type: number
      required: [products, total]

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        salePrice:
          type: number
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        stock:
          type: number
        imageUrl:
          type: string
        isDigital:
          type: boolean
        isSubscription:
          type: boolean
      required: [name, price, category, stock, isDigital, isSubscription]

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        salePrice:
          type: number
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        stock:
          type: number
        imageUrl:
          type: string
        isDigital:
          type: boolean
        isSubscription:
          type: boolean

    MediaItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [music, movie]
        price:
          type: number
        description:
          type: string
        imageUrl:
          type: string
        fileUrl:
          type: string
        licenseType:
          type: string
        createdAt:
          type: string
      required: [id, title, type, price, licenseType, createdAt]

    MediaListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaItem"
        total:
          type: number
        page:
          type: number
        limit:
          type: number
      required: [items, total]

    CreateMediaRequest:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [music, movie]
        price:
          type: number
        description:
          type: string
        imageUrl:
          type: string
        fileUrl:
          type: string
        licenseType:
          type: string
      required: [title, type, price, licenseType]

    DownloadUrlResponse:
      type: object
      properties:
        url:
          type: string
        expiresAt:
          type: string
      required: [url, expiresAt]

    Order:
